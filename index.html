<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expense Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- title  -->
  <h1>Expense Tracker</h1>

  <!-- balance section -->
  <div>
    <h3>Your Balance</h3>
    <p id="balance">₹0.00</p>
  </div>

  <!-- income/expense section -->
  <div>
    <div>
      <h4>Income</h4>
      <p id="income">₹0.00</p>
    </div>

    <div>
      <h4>Expense</h4>
      <p id="expense">₹0.00</p>
    </div>
  </div>

  <!-- form for update -->
  <form>
    <input type="text" placeholder="Eg: Clothes">
    <input type="number" placeholder="Amount">
    <button type="submit">Submit</button>
  </form>

  <!-- unordered list for transaction list -->
  <ul></ul>

  <script src="script.js"></script>
</body>
</html>
